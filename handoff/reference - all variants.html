  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e27c0488-aafb-4552-90fd-039a609aefb4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#0F0F12; color:#E7E7EC; font-family:Manrope,sans-serif; }\n  a { color:#F6BE00; text-decoration:none; }\n  a:hover { color:#FFD34D; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section data-turn=\"2\" style=\"padding:72px 80px 0;display:flex;flex-direction:column;gap:56px;min-width:max-content\">\n  <div style=\"max-width:1120px;display:flex;flex-direction:column;gap:16px\">\n    <div style=\"display:inline-flex;align-items:center;gap:12px\">\n      <span style=\"background:#26262A;color:#9A9AA0;font-size:15px;font-weight:700;padding:4px 12px;border-radius:8px;letter-spacing:.5px\">TURN 2<\u002Fspan>\n      <span style=\"color:#8B8B90;font-size:15px;font-weight:600\">Вариант: <a href=\"#2a\">2a<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin:0;font-size:42px;font-weight:800;letter-spacing:-.5px;line-height:1.1\">Оверлей снизу под кнопкой<\u002Fh1>\n    <p style=\"margin:0;font-size:19px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:900px\">То же, что <a href=\"#1b\">1b<\u002Fa>, но плашка появляется под кнопкой «Применить», а не поверх описания.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:64px;align-items:flex-start\">\n    <div id=\"2a\" style=\"width:1120px;display:flex;flex-direction:column;gap:20px;scroll-margin:40px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <span style=\"background:#26262A;color:#E7E7EC;font-size:16px;font-weight:800;padding:5px 13px;border-radius:9px\">2a<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:800\">Ошибка-оверлей под кнопкой<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:8px;background:#1A1A1E;padding:6px;border-radius:14px;width:fit-content\">\n        <button onclick=\"{{ dEmpty }}\" style=\"background:{{ dSeg.emptyBg }};color:{{ dSeg.emptyColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Пусто<\u002Fbutton>\n        <button onclick=\"{{ dError }}\" style=\"background:{{ dSeg.errorBg }};color:{{ dSeg.errorColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Ошибка<\u002Fbutton>\n        <button onclick=\"{{ dKb }}\" style=\"background:{{ dSeg.kbBg }};color:{{ dSeg.kbColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">С клавиатурой<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"TvPromo\" mode=\"d\" state=\"{{ stateD }}\" hint-size=\"1120px,630px\"><\u002Fdc-import>\n      <p style=\"margin:0;font-size:17px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:1120px\">Плашка ошибки — оверлей под кнопкой, в потоке не участвует, поэтому поле и кнопка стоят на месте. Ошибка идёт сразу после действия пользователя (нажал «Применить» → под кнопкой прилетел ответ), а описание остаётся видимым. Минус — ошибка ниже фокуса, взгляд нужно опустить.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-turn=\"1\" style=\"padding:72px 80px;display:flex;flex-direction:column;gap:56px;min-width:max-content\">\n\n  <div style=\"max-width:1120px;display:flex;flex-direction:column;gap:16px\">\n    <div style=\"display:inline-flex;align-items:center;gap:12px\">\n      <span style=\"background:#26262A;color:#9A9AA0;font-size:15px;font-weight:700;padding:4px 12px;border-radius:8px;letter-spacing:.5px\">TURN 1<\u002Fspan>\n      <span style=\"color:#8B8B90;font-size:15px;font-weight:600\">Варианты: <a href=\"#1a\">1a<\u002Fa> · <a href=\"#1b\">1b<\u002Fa> · <a href=\"#1c\">1c<\u002Fa><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin:0;font-size:42px;font-weight:800;letter-spacing:-.5px;line-height:1.1\">Ошибка не должна двигать кнопку «Применить»<\u002Fh1>\n    <p style=\"margin:0;font-size:19px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:900px\">Три способа показать ошибку так, чтобы кнопка стояла на месте — фокус пульта не «прыгает» после нажатия. Переключайте состояния под каждым макетом: <b style=\"color:#E7E7EC\">Пусто → Ошибка → С клавиатурой<\u002Fb>. Во всех вариантах карточка держится в верхней зоне экрана, поэтому экранная клавиатура (нижняя треть) не перекрывает кнопку.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:64px;align-items:flex-start\">\n\n    <!-- 1a -->\n    <div id=\"1a\" style=\"width:1120px;display:flex;flex-direction:column;gap:20px;scroll-margin:40px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <span style=\"background:#F6BE00;color:#111;font-size:16px;font-weight:800;padding:5px 13px;border-radius:9px\">1a<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:800\">Резерв места под ошибку<\u002Fspan>\n        <span style=\"background:rgba(246,190,0,.14);color:#F6BE00;font-size:13px;font-weight:800;padding:5px 12px;border-radius:20px;letter-spacing:.5px;border:1px solid rgba(246,190,0,.4)\">РЕКОМЕНДУЕМ<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:8px;background:#1A1A1E;padding:6px;border-radius:14px;width:fit-content\">\n        <button onclick=\"{{ aEmpty }}\" style=\"background:{{ aSeg.emptyBg }};color:{{ aSeg.emptyColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Пусто<\u002Fbutton>\n        <button onclick=\"{{ aError }}\" style=\"background:{{ aSeg.errorBg }};color:{{ aSeg.errorColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Ошибка<\u002Fbutton>\n        <button onclick=\"{{ aKb }}\" style=\"background:{{ aSeg.kbBg }};color:{{ aSeg.kbColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">С клавиатурой<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"TvPromo\" mode=\"a\" state=\"{{ stateA }}\" hint-size=\"1120px,630px\"><\u002Fdc-import>\n      <p style=\"margin:0;font-size:17px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:1120px\">Под полем всегда зарезервирована строка высотой в одну ошибку. Пусто — строка невидима, но место занято, поэтому кнопка не смещается ни на пиксель. Самый предсказуемый вариант для D-pad. Минус — небольшой отступ, когда ошибки нет.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 1b -->\n    <div id=\"1b\" style=\"width:1120px;display:flex;flex-direction:column;gap:20px;scroll-margin:40px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <span style=\"background:#26262A;color:#E7E7EC;font-size:16px;font-weight:800;padding:5px 13px;border-radius:9px\">1b<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:800\">Ошибка-оверлей поверх описания<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:8px;background:#1A1A1E;padding:6px;border-radius:14px;width:fit-content\">\n        <button onclick=\"{{ bEmpty }}\" style=\"background:{{ bSeg.emptyBg }};color:{{ bSeg.emptyColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Пусто<\u002Fbutton>\n        <button onclick=\"{{ bError }}\" style=\"background:{{ bSeg.errorBg }};color:{{ bSeg.errorColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Ошибка<\u002Fbutton>\n        <button onclick=\"{{ bKb }}\" style=\"background:{{ bSeg.kbBg }};color:{{ bSeg.kbColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">С клавиатурой<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"TvPromo\" mode=\"b\" state=\"{{ stateB }}\" hint-size=\"1120px,630px\"><\u002Fdc-import>\n      <p style=\"margin:0;font-size:17px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:1120px\">Ошибка выводится плашкой поверх описания — это оверлей, он не участвует в потоке, поэтому поле и кнопка не двигаются вообще. Хорошо, когда высота карточки жёстко ограничена. Минус — описание на время скрыто.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 1c -->\n    <div id=\"1c\" style=\"width:1120px;display:flex;flex-direction:column;gap:20px;scroll-margin:40px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <span style=\"background:#26262A;color:#E7E7EC;font-size:16px;font-weight:800;padding:5px 13px;border-radius:9px\">1c<\u002Fspan>\n        <span style=\"font-size:24px;font-weight:800\">Ошибка внутри поля<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex;gap:8px;background:#1A1A1E;padding:6px;border-radius:14px;width:fit-content\">\n        <button onclick=\"{{ cEmpty }}\" style=\"background:{{ cSeg.emptyBg }};color:{{ cSeg.emptyColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Пусто<\u002Fbutton>\n        <button onclick=\"{{ cError }}\" style=\"background:{{ cSeg.errorBg }};color:{{ cSeg.errorColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">Ошибка<\u002Fbutton>\n        <button onclick=\"{{ cKb }}\" style=\"background:{{ cSeg.kbBg }};color:{{ cSeg.kbColor }};border:none;font-family:inherit;font-size:16px;font-weight:700;padding:10px 22px;border-radius:10px;cursor:pointer\">С клавиатурой<\u002Fbutton>\n      <\u002Fdiv>\n      <dc-import name=\"TvPromo\" mode=\"c\" state=\"{{ stateC }}\" hint-size=\"1120px,630px\"><\u002Fdc-import>\n      <p style=\"margin:0;font-size:17px;font-weight:500;line-height:1.5;color:#A7A7AE;max-width:1120px\">Короткий текст ошибки живёт прямо внутри поля справа, плюс красная рамка. Нулевой прирост высоты — кнопка неподвижна, ошибка сразу рядом с местом ввода. Минус — только для очень коротких сообщений.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { a: 'error', b: 'error', c: 'error', d: 'error' };\n\n  seg(cur) {\n    const on = { Bg: '#F6BE00', Color: '#141414' };\n    const off = { Bg: 'transparent', Color: '#9A9AA0' };\n    const pick = k => (cur === k ? on : off);\n    return {\n      emptyBg: pick('empty').Bg, emptyColor: pick('empty').Color,\n      errorBg: pick('error').Bg, errorColor: pick('error').Color,\n      kbBg: pick('keyboard').Bg, kbColor: pick('keyboard').Color\n    };\n  }\n\n  renderVals() {\n    const set = (opt, val) => () => this.setState({ [opt]: val });\n    return {\n      stateA: this.state.a, stateB: this.state.b, stateC: this.state.c, stateD: this.state.d,\n      aSeg: this.seg(this.state.a), bSeg: this.seg(this.state.b), cSeg: this.seg(this.state.c), dSeg: this.seg(this.state.d),\n      aEmpty: set('a', 'empty'), aError: set('a', 'error'), aKb: set('a', 'keyboard'),\n      bEmpty: set('b', 'empty'), bError: set('b', 'error'), bKb: set('b', 'keyboard'),\n      cEmpty: set('c', 'empty'), cError: set('c', 'error'), cKb: set('c', 'keyboard'),\n      dEmpty: set('d', 'empty'), dError: set('d', 'error'), dKb: set('d', 'keyboard')\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
